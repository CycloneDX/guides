<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" width="680" height="520" viewBox="0 0 680 520" font-family="Helvetica, Arial, sans-serif"><title>Choosing an attack construct</title><defs></defs><g id="background" inkscape:label="Background"><rect x="0" y="0" width="680" height="520" fill="white"/></g><g id="artwork" inkscape:label="Artwork"><text x="340.0" y="28" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#333333">Which attack construct fits the job</text><rect x="150" y="70" width="460" height="400" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1.4" opacity="1.0"/><line x1="380.0" y1="70" x2="380.0" y2="470" stroke="#E0E0E0" stroke-width="1.2"/><line x1="150" y1="270.0" x2="610" y2="270.0" stroke="#E0E0E0" stroke-width="1.2"/><text x="265.0" y="62" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#777">known technique</text><text x="495.0" y="62" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#777">specific to this system</text><text x="140" y="170.0" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="end" fill="#777">single</text><text x="140" y="184.0" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="end" fill="#777">point</text><text x="140" y="370.0" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="end" fill="#777">sequence</text><text x="140" y="384.0" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="end" fill="#777">or structure</text><rect x="165.0" y="130.0" width="200" height="80" rx="8" fill="#E4F2FF" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="265.0" y="162.0" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333333">Attack pattern</text><text x="265.0" y="182.0" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">names a known technique (CAPEC, AT</text><text x="265.0" y="195.0" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">T&amp;CK)</text><rect x="395.0" y="130.0" width="200" height="80" rx="8" fill="#FCE4EC" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="495.0" y="162.0" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333333">Abuse case</text><text x="495.0" y="182.0" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">misuse of one intended function</text><rect x="165.0" y="330.0" width="200" height="80" rx="8" fill="#E4F2FF" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="265.0" y="362.0" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333333">Attack tree</text><text x="265.0" y="382.0" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">how many ways to reach a goal (AND</text><text x="265.0" y="395.0" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">/OR)</text><rect x="395.0" y="330.0" width="200" height="80" rx="8" fill="#FFF3E0" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="495.0" y="362.0" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333333">Attack path</text><text x="495.0" y="382.0" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">the route and boundaries, in order</text></g></svg>