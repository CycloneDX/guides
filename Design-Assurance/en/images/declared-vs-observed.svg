<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" width="720" height="420" viewBox="0 0 720 420" font-family="Helvetica, Arial, sans-serif"><title>Declared versus observed</title><defs></defs><g id="background" inkscape:label="Background"><rect x="0" y="0" width="720" height="420" fill="white"/></g><g id="artwork" inkscape:label="Artwork"><text x="360.0" y="30" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#333333">Acknowledgment: declared, observed, or both</text><g id="region-declared-circle" inkscape:label="Declared circle"><circle cx="290" cy="220" r="150" fill="#E4F2FF" stroke="none" stroke-width="1.4"/></g><g id="region-observed-circle" inkscape:label="Observed circle"><circle cx="430" cy="220" r="150" fill="#FCE4EC" stroke="none" stroke-width="1.4"/></g><g id="region-intersection" inkscape:label="Intersection"><path d="M 360.0 87.34 A 150 150 0 0 1 360.0 352.66 A 150 150 0 0 1 360.0 87.34 Z" stroke="none" stroke-width="1.4" fill="#DCD0EC"/></g><g id="region-outlines" inkscape:label="Outlines"><circle cx="290" cy="220" r="150" fill="none" stroke="#484D80" stroke-width="1.8"/><circle cx="430" cy="220" r="150" fill="none" stroke="#85283C" stroke-width="1.8"/></g><text x="230" y="90" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#484D80">Declared</text><text x="490" y="90" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#85283C">Observed</text><text x="220" y="214" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">declared,</text><text x="220" y="230" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="normal" text-anchor="middle" fill="#333333">not yet seen</text><text x="220" y="252" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#777">bi-delegate</text><text x="360.0" y="214" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#3E8E5A">confirmed</text><text x="360.0" y="232" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">bi-invoke-tool</text><text x="500" y="206" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#85283C">observed,</text><text x="500" y="222" font-family="Helvetica, Arial, sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#85283C">never declared</text><text x="500" y="240" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#F15A26">THE ANOMALY</text><text x="500" y="260" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#777">bi-dir-list</text><text x="360.0" y="400" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="middle" fill="#666">The single-membership right crescent is the signal detection and supply chain authenticity act on.</text></g></svg>