<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" width="860" height="530" viewBox="0 0 860 530" font-family="Helvetica, Arial, sans-serif"><title>VDR and VAR versus VEX</title><defs></defs><g id="background" inkscape:label="Background"><rect x="0" y="0" width="860" height="530" fill="white"/></g><g id="artwork" inkscape:label="Artwork"><text x="430" y="30" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#333333">VDR and VAR versus VEX: two assertions, one document family</text><g id="panel-vdr" inkscape:label="VDR and VAR panel"><rect x="45" y="56" width="375" height="330" rx="8" fill="#E4F2FF" stroke="#484D80" stroke-width="1.8"/><text x="232" y="86" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#484D80">VDR and VAR</text><text x="232" y="104" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">Vulnerability Disclosure Report / Vulnerability Advisory Report</text><text x="70" y="140" font-size="11.5" font-weight="bold" fill="#333333">Asserts</text><text x="70" y="156" font-size="11" fill="#333333">what is vulnerable, and its impact</text><text x="70" y="186" font-size="11.5" font-weight="bold" fill="#333333">Covers</text><text x="70" y="202" font-size="11" fill="#333333">known and previously unknown vulnerabilities</text><text x="70" y="232" font-size="11.5" font-weight="bold" fill="#333333">Scope</text><text x="70" y="248" font-size="11" fill="#333333">a product and its dependencies</text><text x="70" y="278" font-size="11.5" font-weight="bold" fill="#333333">Carries</text><text x="70" y="294" font-size="11" fill="#333333">ratings, recommendations, workarounds, fixes</text><text x="70" y="324" font-size="11.5" font-weight="bold" fill="#333333">Grounding</text><text x="70" y="340" font-size="11" fill="#333333">NIST SP 800-161r1 names the VDR.</text><text x="70" y="355" font-size="11" fill="#333333">The upd1 revision renames it the VAR (ISO/IEC 29147)</text></g><g id="panel-vex" inkscape:label="VEX panel"><rect x="440" y="56" width="375" height="330" rx="8" fill="#FCE4EC" stroke="#85283C" stroke-width="1.8"/><text x="627" y="86" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#85283C">VEX</text><text x="627" y="104" font-family="Helvetica, Arial, sans-serif" font-size="10" font-weight="normal" text-anchor="middle" fill="#555">Vulnerability Exploitability eXchange</text><text x="465" y="140" font-size="11.5" font-weight="bold" fill="#333333">Asserts</text><text x="465" y="156" font-size="11" fill="#333333">what is not affected, and why</text><text x="465" y="186" font-size="11.5" font-weight="bold" fill="#333333">Covers</text><text x="465" y="202" font-size="11" fill="#333333">known, identified vulnerabilities only</text><text x="465" y="232" font-size="11.5" font-weight="bold" fill="#333333">Scope</text><text x="465" y="248" font-size="11" fill="#333333">a product, in its usage context</text><text x="465" y="278" font-size="11.5" font-weight="bold" fill="#333333">Carries</text><text x="465" y="294" font-size="11" fill="#333333">status, justification, response</text><text x="465" y="324" font-size="11.5" font-weight="bold" fill="#333333">Grounding</text><text x="465" y="340" font-size="11" fill="#333333">NTIA software transparency lineage,</text><text x="465" y="355" font-size="11" fill="#333333">stewarded by CISA</text></g><g id="panel-shared" inkscape:label="Shared foundation"><rect x="45" y="408" width="770" height="76" rx="8" fill="#E8F5E9" stroke="#9AA0A6" stroke-width="1.4"/><text x="430" y="434" font-family="Helvetica, Arial, sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#333333">Shared foundation</text><text x="430" y="452" font-size="11" text-anchor="middle" fill="#333333">The same vulnerabilities array and the same document family, continuously updated, signed, published alongside the SBOM.</text><text x="430" y="468" font-size="11" text-anchor="middle" fill="#333333">One document can assert in both directions at once.</text></g><text x="430" y="512" font-size="10.5" text-anchor="middle" fill="#666">A producer does not choose a format. It chooses what to assert.</text></g></svg>
