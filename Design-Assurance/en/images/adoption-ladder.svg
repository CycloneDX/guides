<svg xmlns="http://www.w3.org/2000/svg" xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape" width="820" height="460" viewBox="0 0 820 460" font-family="Helvetica, Arial, sans-serif"><title>The adoption ladder</title><defs><marker id="arrow9AA0A6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 9 5 L 0 9 z" fill="#9AA0A6"/></marker></defs><g id="background" inkscape:label="Background"><rect x="0" y="0" width="820" height="460" fill="white"/></g><g id="artwork" inkscape:label="Artwork"><text x="410.0" y="28" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#333333">The adoption ladder: each rung is a valid stopping point</text><rect x="70" y="360" width="300" height="66" rx="8" fill="#BCD5F4" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="88" y="388" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start" fill="#333333">Describe</text><text x="88" y="408" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="start" fill="#555">architecture, intent, behavior</text><line x1="370" y1="393.0" x2="220" y2="309.0" stroke="#9AA0A6" stroke-width="1.4" marker-end="url(#arrow9AA0A6)"/><rect x="220" y="276" width="300" height="66" rx="8" fill="#E4F2FF" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="238" y="304" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start" fill="#333333">Analyze</text><text x="238" y="324" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="start" fill="#555">threat model, privacy, risk</text><line x1="520" y1="309.0" x2="370" y2="225.0" stroke="#9AA0A6" stroke-width="1.4" marker-end="url(#arrow9AA0A6)"/><rect x="370" y="192" width="300" height="66" rx="8" fill="#E8F5E9" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="388" y="220" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start" fill="#333333">Demonstrate</text><text x="388" y="240" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="start" fill="#555">controls, evidence, attestation</text><line x1="670" y1="225.0" x2="520" y2="141.0" stroke="#9AA0A6" stroke-width="1.4" marker-end="url(#arrow9AA0A6)"/><rect x="520" y="108" width="300" height="66" rx="8" fill="#FFF3E0" stroke="#9AA0A6" stroke-width="1.4" opacity="1.0"/><text x="538" y="136" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="start" fill="#333333">Compose</text><text x="538" y="156" font-family="Helvetica, Arial, sans-serif" font-size="10.5" font-weight="normal" text-anchor="start" fill="#555">link, assess, sign</text></g></svg>