name: Generate Guide

on:
  workflow_dispatch:
    inputs:
      document_type:
        description: 'Select the type of guide to generate'
        required: true
        default: 'SBOM'
        type: choice
        options:
          - ALL
          - Attestations
          - CBOM
          - Design-Assurance
          - HBOM
          - MBOM
          - MLBOM
          - OBOM
          - SaaSBOM
          - SBOM
          - VEX_VDR
      draft:
        description: 'Stamp a diagonal DRAFT watermark on body pages'
        required: false
        default: true
        type: boolean

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t cdx-guides-builder .

      - name: Create output directory
        run: mkdir -p docs

      - name: Run Docker container
        run: docker run -v $(pwd)/docs:/workspace/docs cdx-guides-builder ${{ github.event.inputs.document_type }} ${{ github.event.inputs.draft == 'false' && '--final' || '' }}

      - name: List files in docs directory
        run: ls -l docs

      - name: Upload .pdf files
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/**
